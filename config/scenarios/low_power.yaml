# Low Power Scenario - Energy Optimization
# Optimized for minimal energy consumption

network:
  num_nodes: 100              # Reduced node count
  area_dimension: 100.0       # Same area, lower density
  bs_position: [50.0, 50.0]
  percent_actuators: 5.0       # Fewer actuators

simulation:
  max_rounds: 800             # Shorter simulation
  num_runs: 20                # Fewer Monte Carlo runs
  random_seed: 42

attack:
  malicious_percentage: 10.0  # Lower attack rate

energy_model:
  E_elec: 40.0e-9             # Reduced electronics energy
  E_fs: 8.0e-12               # Reduced free-space loss
  E_mp: 0.0010e-12            # Reduced multipath loss
  d0: 87.7
  initial_energy: 0.2          # 0.2J per node (low power)

security:
  key_renewal_interval: 150   # Less frequent renewal
  nonce_window_size: 30       # Smaller window
  tesla_chain_length: 50

protocol_params:
  alpha: 0.8                  # Higher weight on energy
  beta: 0.2                   # Lower weight on distance
  delta: 0.01
  gamma0: 0.25                # Lower base trust
  sigma0: 0.15
  k_sigmoid: 20.0
  theta_trust: 0.35           # Stricter isolation
  delta_pos: 0.08             # Slower positive reinforcement
  delta_neg: 0.20             # Faster negative reinforcement

tangle:
  tip_limit: 5                # Fewer concurrent tips
  validation_cost: 0.5e-6     # Lower validation cost
  storage_cost_per_byte: 0.5e-9

export:
  csv: true
  json: true
  plots: true
  output_directory: results_low_power
