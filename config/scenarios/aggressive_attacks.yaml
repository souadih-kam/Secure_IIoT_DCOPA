# Aggressive Attacks Scenario - Security Stress Testing
# Optimized for testing security mechanisms under heavy attack

network:
  num_nodes: 200              # Moderate node count
  area_dimension: 100.0       # Standard area
  bs_position: [50.0, 50.0]
  percent_actuators: 10.0

simulation:
  max_rounds: 1000            # Longer to observe attack evolution
  num_runs: 25                # More runs for statistical significance
  random_seed: 42

attack:
  malicious_percentage: 40.0  # Very high attack rate
  types:
    - "Black Hole / Gray Hole internal"
    - "Data Tampering"
    - "Internal replay"
    - "Selective Forwarding internal"
    - "Internal Sybil"
    - "Spoofing / Impersonation"
    - "Cluster-Head Compromise"
    - "Trust challenge"
    - "Authentication"
    - "Collusion"
    - "Denial-of-Service (DoS)"
    - "Jamming"
    - "Eavesdropping (content)"
    - "Hello Flood"
  jammer_radius: 30.0         # Larger jammer radius
  dos_packet_flood_count: 20  # More aggressive DoS

energy_model:
  E_elec: 50.0e-9
  E_fs: 10.0e-12
  E_mp: 0.0013e-12
  d0: 87.7
  initial_energy: 0.6          # Higher energy to survive attacks

security:
  key_renewal_interval: 50    # Very frequent renewal
  nonce_window_size: 60       # Larger window for replay protection
  tesla_chain_length: 150     # Longer chain for µTESLA

protocol_params:
  alpha: 0.6                  # Standard weights
  beta: 0.4
  delta: 0.01
  gamma0: 0.4                 # Higher base trust weight
  sigma0: 0.10                # Lower threshold = more sensitive
  k_sigmoid: 30.0             # Very sharp sigmoid
  theta_trust: 0.3            # Lower threshold = faster isolation
  delta_pos: 0.15             # Faster positive reinforcement
  delta_neg: 0.25             # Much faster negative reinforcement

tangle:
  tip_limit: 20               # More tips for higher throughput
  validation_cost: 2.0e-6     # Higher cost for security
  storage_cost_per_byte: 2.0e-9

export:
  csv: true
  json: true
  plots: true
  output_directory: results_aggressive_attacks
