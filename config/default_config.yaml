
# Simulation parameters corresponding to Table 4 of the paper
# Secure-IIoT-DCOPA — Default Configuration

network:
  num_nodes: 300
  area_dimension: 100.0        # meters (100x100 m² grid)
  bs_position: [50.0, 50.0]   # Base Station at center
  percent_actuators: 10.0     # 10% of nodes are actuators (infinite energy)

simulation:
  max_rounds: 1200
  num_runs: 30                  # Monte Carlo runs for statistical significance
  random_seed: 42               # Primary seed; each run uses seed+run_id

attack:
  malicious_percentage: 20.0   # 20% malicious nodes

energy_model:
  E_elec: 50.0e-9              # 50 nJ/bit (transmit/receive electronics)
  E_fs: 10.0e-12               # 10 pJ/bit/m² (free-space path loss)
  E_mp: 0.0013e-12             # 0.0013 pJ/bit/m⁴ (multipath fading)
  d0: 87.7                     # Crossover distance (m)
  initial_energy: 0.5          # 0.5 J per sensor node

security:
  key_renewal_interval: 100    # Key renewal every 100 rounds (forward secrecy)
  nonce_window_size: 50        # Anti-replay nonce window
  tesla_chain_length: 100      # µTESLA key chain length (SecLEACH)

protocol_params:
  alpha: 0.6                   # Energy weight (Spearman ρ=0.87 with lifetime)
  beta: 0.4                    # Distance weight (α + β = 1)
  delta: 0.01                  # Tie-breaking constant (collision rate < 0.3%)
  gamma0: 0.3                  # Base trust weight (adaptive via sigmoid)
  sigma0: 0.15                 # Trust dispersion activation threshold
  k_sigmoid: 20.0              # Sigmoid sharpness for γ_R adaptation
  theta_trust: 0.4             # Isolation threshold
  delta_pos: 0.10              # Trust positive reinforcement
  delta_neg: 0.15              # Trust multiplicative penalty

tangle:
  tip_limit: 10                # Maximum concurrent tips
  validation_cost: 1.0e-6     # Energy per transaction validation (J)
  storage_cost_per_byte: 1.0e-9  # Energy per byte stored (J)

export:
  csv: true
  json: true
  plots: true
  output_directory: results_sample
